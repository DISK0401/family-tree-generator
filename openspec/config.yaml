# openspec/config.yaml
schema: spec-driven

context: |
  プロジェクト: 日本市場向けWeb家系図作成サービス(個人開発・freemium)

  プロダクト構成:
  - 無料版: クライアント完結。家系図データはサーバに一切保存しない
    (IndexedDB保存 + GEDCOM/JSONエクスポート・インポート)
  - 有償版: 戸籍スキャン画像から家系図を自動生成。
    クラウド保存、パスワード付き親族共有、Stripe課金

  技術スタック:
  - フロント: TypeScript / React / Vite、家系図描画は family-chart (D3.js, MIT)
  - 無料版ストレージ: IndexedDB(サーバ通信なし)、静的ホスティング(Cloudflare(Workers static assets))
  - 有償版バックエンド: Supabase(PostgreSQL + RLS / Storage / Edge Functions)
  - OCR・構造化: Gemini API(マルチモーダル)でOCR+JSON構造化 → ルール検証 → 人間校正
  - データ標準: GEDCOM 7.0の入出力に対応(内部データはそれ以上に柔軟なオブジェクト構造でも可)
    - インポート/エクスポートにおいては、GEDCOM 5.5.1との互換性モードを用意する

  絶対制約(全アーティファクトで遵守):
  - 無料版はいかなる家系図データ・個人情報もサーバへ送信しない設計を厳守
  - 戸籍画像・抽出データは要配慮個人情報に準じて扱う
    (保存時暗号化、学習不使用のAPI設定必須、外部API送信は越境移転の同意取得が前提)
  - 生成する家系図は「観賞用・記念用」。相続関係説明図等の事実証明文書は生成しない
  - AI抽出結果は必ず人間の校正を経てから確定(全自動確定は禁止)
  - 和暦⇄西暦の相互変換、旧字体・異体字への対応を常に考慮
  - 養子縁組・再婚・複数配偶者など複雑な家族関係をデータモデルで表現可能にする

  参照ドキュメント(プランニング前に必読):
  - docs/research/2026-07-market-ux-legal.md(競合・UX不満・法規制・技術スタック調査)
  - docs/research/2026-07-koseki-ocr.md(戸籍OCR技術評価・NDLOCR比較・推奨パイプライン)

  その他:
  - アーティファクトはすべて日本語で記述すること。
  - git commitは日本語で書くこと。また、コミット粒度は「1つの機能追加・修正・改善単位」とする。
  - README.mdは常に最新の状態に保つこと。README.mdの更新はタスクとして扱う。

rules:
  proposal:
    - 競合製品の類似機能を調査し、最低同程度のUXを確保する。可能であればUX改善を提案する
    - 無料版/有償版のどちらに影響する変更かを明記する
    - プライバシー・法務への影響有無を必ず評価する(戸籍データの流れが変わる場合は特に)
    - ロールバック方針を含める
  specs:
    - Given/When/Then形式でシナリオを記述する
    - 和暦入力・旧字体・複雑な家族関係(養子・再婚)のエッジケースを含める
    - 個人データの保存先(クライアント/サーバ)が変わるシナリオはプライバシー要件を明記する
  design:
    - データがクライアント/サーバ/外部APIのどこに存在・送信されるかのデータフローを明記する
    - Supabaseを使う機能はRLSポリシー設計を含める
    - 外部API(Gemini等)へ送信するデータの範囲と最小化方針を明記する
  tasks:
    - タスクは小さく独立して検証可能な単位に分割する
    - 各タスクに完了条件(テスト観点)を1行添える